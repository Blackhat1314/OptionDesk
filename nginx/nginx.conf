upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Admin static panel ────────────────────────────────────────────────────
    location /admin/ {
        alias /etc/nginx/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Admin API ─────────────────────────────────────────────────────────────
    location /admin-api/ {
        proxy_pass http://backend/admin-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── API routes ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── Hashed JS/CSS assets (highest priority regex) ─────────────────────────
    location ~* ^/assets/.*\.(js|css|woff2?|png|svg|ico)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Root — serve the React app ────────────────────────────────────────────
    location = / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── index.html (fetched directly by browser after hard refresh) ───────────
    location = /index.html {
        proxy_pass http://frontend/index.html;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── favicon / manifest ────────────────────────────────────────────────────
    location ~* ^/(favicon\.ico|manifest\.json|robots\.txt|vite\.svg)$ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }

    # ── All other routes → serve React SPA (index.html) ──────────────────────
    # React Router handles /login, /dashboard etc. client-side
    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
